<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile – Proctoring Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00c853; --accent-dark: #009624; --bg-page: #f0f7f0; --text-dark: #1b2e1b; }
        * { font-family: 'DM Sans', system-ui, sans-serif; }
        body { background: var(--bg-page); }
        .profile-nav {
            background: linear-gradient(135deg, #0d1f0d 0%, #1a3d1a 100%) !important;
            border-bottom: 1px solid rgba(0,200,83,0.2);
        }
        .profile-nav .btn-outline-secondary { border-radius: 10px; }
        .profile-nav .btn-outline-danger { border-radius: 10px; }
        .profile-card {
            background: white;
            border-radius: 16px;
            border: 1px solid rgba(0,200,83,0.15);
            box-shadow: 0 4px 20px rgba(0,200,83,0.08);
        }
        .profile-card .form-control { border-radius: 10px; }
        .profile-card .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,200,83,0.15); }
        .profile-card .btn-primary {
            background: linear-gradient(145deg, var(--accent), var(--accent-dark));
            border: none;
            border-radius: 10px;
            font-weight: 600;
        }
        .profile-card h1 { font-family: 'Outfit', sans-serif; font-weight: 600; color: var(--text-dark); }
    </style>
</head>
<body>
    <!-- Minimal Header -->
    <nav class="navbar navbar-expand-lg profile-nav">
        <div class="container-fluid">
            <button class="btn btn-outline-light" onclick="window.history.back()">
                <i class="bx bx-arrow-back"></i> Back
            </button>
            <div class="ms-auto">
                <button class="btn btn-outline-light border-danger text-danger" onclick="logout()">
                    <i class="bx bx-log-out"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid p-4">
            <div class="d-flex justify-content-center align-items-center mb-4">
                <h1 class="h3">Profile Information</h1>
            </div>

            <div class="row">
                <div class="col-md-12">
                    <div class="card profile-card">
                        <div class="card-body">
                            <form id="profileForm">
                                <div class="mb-3">
                                    <label class="form-label">Name</label>
                                    <input type="text" class="form-control" id="name" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" id="email" readonly>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label">Change Password</label>
                                    <input type="password" class="form-control" id="newPassword" placeholder="Leave blank to keep current password">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Account Type</label>
                                    <input type="text" class="form-control" id="type" readonly>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Member Since</label>
                                    <input type="text" class="form-control" id="created_at" readonly>
                                </div>

                                <button type="submit" class="btn btn-primary">Update Profile</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>


        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script>


        async function loadProfile() {
            const userId = sessionStorage.getItem('userId');
            const response = await fetch(`/select?collection=users&id=${userId}`);
            const user = await response.json();

            document.getElementById('name').value = user.name || '';
            document.getElementById('email').value = user.email || '';
            document.getElementById('type').value = (user.role || user.type || 'Unknown').toLowerCase();
            document.getElementById('created_at').value = user.createdAt ? new Date(user.createdAt).toLocaleDateString() : (user.created_at ? new Date(user.created_at).toLocaleDateString() : 'Not set');


        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userId = sessionStorage.getItem('userId');
            const userData = {
                name: document.getElementById('name').value
            };
            
            if (document.getElementById('newPassword').value) {
                userData.password = document.getElementById('newPassword').value;
            }
            
            try {
                const response = await fetch(`/edit/${userId}?collection=users`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(userData)
                });
                
                if (response.ok) {
                    alert('Profile updated successfully');
                    loadProfile();
                } else {
                    alert('Failed to update profile');
                }
            } catch (err) {
                alert('Error updating profile: ' + err.message);
            }
        });

        async function logout() {
            try {
                const uidOut = sessionStorage.getItem('userId');
                const response = await fetch('/logout', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ user_id: uidOut || '' })
                });
                if (response.ok) {
                    sessionStorage.removeItem('logged_admin_dash_open_v1');
                    sessionStorage.removeItem('logged_proctor_dash_open_v1');
                    sessionStorage.clear();
                    window.location.href = '/';
                } else {
                    alert('Logout failed');
                }
            } catch (error) {
                alert('Error during logout: ' + error.message);
            }
        }

        // Load profile when page loads
        loadProfile();
    </script>
</body>
</html>
