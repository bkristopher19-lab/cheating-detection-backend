<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error – Proctoring Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00c853; --bg-start: #0d1f0d; --bg-end: #1a3d1a; }
        * { font-family: 'DM Sans', system-ui, sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 50%, #0f2d0f 100%);
            background-attachment: fixed;
        }
        .error-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .error-card {
            background: rgba(255,255,255,0.98);
            border-radius: 20px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.25);
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(0,200,83,0.2);
        }
        .error-icon { font-size: 4rem; color: #dc3545; margin-bottom: 1rem; }
        .error-title { font-family: 'Outfit', sans-serif; font-weight: 700; color: #dc3545; margin-bottom: 1rem; }
        .error-message { color: #5a7a5a; margin-bottom: 2rem; }
        .error-card .btn-primary {
            background: linear-gradient(145deg, var(--accent), #009624);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            padding: 0.6rem 1.5rem;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-card">
            <div class="error-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h1 class="error-title">Access Denied</h1>
            <p class="error-message">{{ message or 'Invalid or expired share link.' }}</p>
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home me-2"></i>Go to Home
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
