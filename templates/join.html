<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Class – Proctoring Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00c853; --accent-dark: #009624; --bg-start: #0d1f0d; --bg-end: #1a3d1a; }
        * { font-family: 'DM Sans', system-ui, sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 50%, #0f2d0f 100%);
            background-attachment: fixed;
        }
        .join-wrapper {
            background: rgba(255,255,255,0.98);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 24px 64px rgba(0,0,0,0.25);
            max-width: 480px;
            margin: 0 auto;
        }
        .join-wrapper .spinner-border { color: var(--accent) !important; }
        .join-wrapper .text-success { color: var(--accent) !important; }
        .join-wrapper h5 { font-family: 'Outfit', sans-serif; font-weight: 600; }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">
    <div class="container text-center py-5">
        <div class="join-wrapper">
        <div id="joinStatus" class="mb-4">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 text-muted">Joining class...</p>
        </div>
        <div id="joinError" class="alert alert-danger d-none" role="alert"></div>
        </div>
    </div>

    <script>
        (async function() {
            const pathParts = window.location.pathname.split('/');
            const code = (pathParts[pathParts.length - 1] || '').trim().toUpperCase();
            if (!code) {
                document.getElementById('joinStatus').innerHTML = '<p class="text-danger">Invalid invite link.</p>';
                return;
            }

            const userId = sessionStorage.getItem('userId');
            const userStr = sessionStorage.getItem('user');
            const user = userStr ? JSON.parse(userStr) : {};
            const role = user.role || user.type || '';

            // Not logged in -> save pending join and redirect to login
            if (!userId) {
                sessionStorage.setItem('pendingJoinCode', code);
                sessionStorage.setItem('redirectAfterLogin', '/join/' + code);
                window.location.href = '/?redirect=' + encodeURIComponent('/join/' + code);
                return;
            }

            // Only students can join via link
            if (role !== 'student') {
                document.getElementById('joinStatus').classList.add('d-none');
                document.getElementById('joinError').classList.remove('d-none');
                document.getElementById('joinError').textContent = 'Only students can join a class. You are logged in as ' + (role || 'another role') + '.';
                return;
            }

            try {
                const classesRes = await fetch('/select?collection=classes');
                const classes = await classesRes.json();
                const targetClass = (classes || []).find(cls => (cls.join_code || '').toUpperCase() === code);

                if (!targetClass) {
                    document.getElementById('joinStatus').innerHTML = '<p class="text-danger"><i class="bx bx-error-circle"></i> Invalid or expired invite link.</p>';
                    return;
                }

                const updateRes = await fetch(`/edit/${userId}?collection=users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ class_id: targetClass.id })
                });

                if (!updateRes.ok) {
                    const errJson = await updateRes.json().catch(() => ({}));
                    throw new Error(errJson.error || 'Failed to join class');
                }

                sessionStorage.removeItem('pendingJoinCode');
                sessionStorage.removeItem('redirectAfterLogin');
                document.getElementById('joinStatus').innerHTML =
                    '<p class="text-success"><i class="bx bx-check-circle fs-1"></i></p>' +
                    '<h5>You joined ' + targetClass.course + ' - ' + targetClass.section + '</h5>' +
                    '<p class="text-muted">Redirecting to your dashboard...</p>';
                setTimeout(() => { window.location.href = '/student_dashboard?joined=1'; }, 1500);
            } catch (err) {
                document.getElementById('joinStatus').classList.add('d-none');
                document.getElementById('joinError').classList.remove('d-none');
                document.getElementById('joinError').textContent = err.message || 'Failed to join class. Please try again.';
            }
        })();
    </script>
</body>
</html>
