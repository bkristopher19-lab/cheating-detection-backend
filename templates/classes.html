<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classes Management</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/images/192.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.11.5/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00c853; --accent-dark: #009624; --bg-page: #f0f7f0; }
        body { background: var(--bg-page); font-family: 'DM Sans', system-ui, sans-serif; }
        .main-content { background: var(--bg-page); }
        .page-title { font-family: 'Outfit', sans-serif; font-weight: 700; color: #1b2e1b; }
        .card { border-radius: 16px; border: 1px solid rgba(0,200,83,0.15); box-shadow: 0 4px 20px rgba(0,200,83,0.08); }
        .btn-primary { background: linear-gradient(145deg, var(--accent), var(--accent-dark)) !important; border: none !important; border-radius: 10px !important; }
        .modal-content { border-radius: 16px; }
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,200,83,0.15); }
    </style>
</head>
<body>
    <!-- Include Sidebar -->
    {% include 'sidebar.html' %}

    <!-- Main Content -->
    <div class="main-content" id="main-content">
        <!-- Include Navbar -->
        {% include 'navbar.html' %}

        <!-- Page Content -->
        <div class="container-fluid p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 page-title">Classes (Course & Section) Management</h1>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#classModal">
                    <i class='bx bx-plus'></i> Add Class
                </button>
            </div>

            <!-- Classes Table -->
            <div class="card">
                <div class="card-body">
                    <table id="classesTable" class="table table-striped">
                        <thead>
                            <tr>
                                <th>Course</th>
                                <th>Section</th>
                                <th>Join Code / Invite Link</th>
                                <th>Assigned Proctor</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Class Modal -->
    <div class="modal fade" id="classModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add / Edit Class</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="classForm">
                        <input type="hidden" id="classId">
                        <div class="mb-3">
                            <label class="form-label">Course</label>
                            <input type="text" class="form-control" id="course" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Section</label>
                            <input type="text" class="form-control" id="section" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Assign Proctor</label>
                            <select class="form-control" id="proctorSelect" required>
                                <option value="">-- Select Proctor or Admin --</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Join Code</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="joinCode" readonly>
                                <button class="btn btn-outline-secondary" type="button" id="regenJoinCode">Regenerate</button>
                            </div>
                            <small class="text-muted">Share this code or the invite link with students so they can join the section.</small>
                            <div class="input-group mt-2">
                                <input type="text" class="form-control form-control-sm" id="inviteLink" readonly placeholder="Save class first to get invite link">
                                <button class="btn btn-outline-primary btn-sm" type="button" id="copyInviteLink" title="Copy invite link">
                                    <i class='bx bx-link'></i> Copy invite link
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="saveClass">Save Class</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Include the same scripts as exams.html -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/dataTables.bootstrap5.min.js"></script>

    <script>
        // Initialize DataTable
        let classesTable = $('#classesTable').DataTable();

        // Load Proctors into Select
        async function loadProctorsInto(selector) {
            try {
                const res = await fetch('/select?collection=users');
                const users = await res.json();
                const proctors = users.filter(u => {
                    const r = ((u.role || u.type) + '').toString().toLowerCase().trim();
                    return r === 'proctor' || r === 'teacher' || r === 'admin';
                });
                const $sel = $(selector);
                $sel.empty();
                $sel.append('<option value="">-- Select Proctor or Admin --</option>');
                proctors.forEach(p => {
                    $sel.append(`<option value="${p.id}">${p.name} (${p.role})</option>`);
                });
            } catch (err) {
                console.error('Failed to load proctors:', err);
            }
        }

        // Generate a 6-character join code
        function generateJoinCode() {
            const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 6; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        // Load Classes
        async function loadClasses() {
            const response = await fetch('/select?collection=classes');
            const classes = await response.json();
            // Also fetch users map for proctor names
            const usersRes = await fetch('/select?collection=users');
            const users = await usersRes.json();
            const userMap = {};
            users.forEach(u => userMap[u.id] = u.name);

            classesTable.clear();
            const baseUrl = window.location.origin;
            classes.forEach(c => {
                const code = c.join_code || '';
                const linkCell = code
                    ? `<span class="me-2">${code}</span>
                       <button onclick="copyInviteLinkFromTable('${code}')" class="btn btn-sm btn-outline-primary" title="Copy invite link">
                           <i class='bx bx-link'></i>
                       </button>`
                    : '<span class="text-muted">None</span>';
                classesTable.row.add([
                    c.course,
                    c.section,
                    linkCell,
                    userMap[c.proctor_id] || 'Unassigned',
                    `<button onclick="editClass('${c.id}')" class="btn btn-sm btn-warning me-1">
                        <i class='bx bx-edit'></i>
                     </button>
                     <button onclick="deleteClass('${c.id}')" class="btn btn-sm btn-danger">
                        <i class='bx bx-trash'></i>
                     </button>`
                ]);
            });
            classesTable.draw();
        }

        // Show modal -> refresh proctor list, generate join code for new class
        $('#classModal').on('show.bs.modal', function() {
            loadProctorsInto('#proctorSelect');
            if (!$('#classId').val() && !$('#joinCode').val()) {
                $('#joinCode').val(generateJoinCode());
            }
        });

        // Save Class
        $('#saveClass').click(async function() {
            const classData = {
                course: $('#course').val(),
                section: $('#section').val(),
                proctor_id: $('#proctorSelect').val(),
                join_code: $('#joinCode').val() || generateJoinCode()
            };
            const classId = $('#classId').val();
            const url = classId ? `/edit/${classId}?collection=classes` : '/add?collection=classes';
            const response = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(classData)
            });
            if (response.ok) {
                $('#classModal').modal('hide');
                loadClasses();
            }
        });

        // Edit Class
        async function editClass(id) {
            const response = await fetch(`/select?collection=classes&id=${id}`);
            const cls = await response.json();
            $('#classId').val(id);
            $('#course').val(cls.course);
            $('#section').val(cls.section);
            $('#joinCode').val(cls.join_code || generateJoinCode());
            await loadProctorsInto('#proctorSelect');
            $('#proctorSelect').val(cls.proctor_id || '');
            $('#classModal').modal('show');
        }

        // Delete Class
        async function deleteClass(id) {
            if (!confirm('Delete this class?')) return;
            const response = await fetch(`/delete/${id}?collection=classes`, { method: 'POST' });
            if (response.ok) loadClasses();
        }

        // Clear form when modal is hidden
        $('#classModal').on('hidden.bs.modal', function() {
            $('#classForm')[0].reset();
            $('#classId').val('');
            $('#joinCode').val('');
        });

        // Regenerate join code
        $('#regenJoinCode').on('click', function() {
            $('#joinCode').val(generateJoinCode());
            updateInviteLink();
        });

        // Update invite link when join code changes
        function updateInviteLink() {
            const code = $('#joinCode').val();
            const $inviteInput = $('#inviteLink');
            if (code) {
                $inviteInput.val(window.location.origin + '/join/' + code);
            } else {
                $inviteInput.val('');
            }
        }

        // Copy invite link (modal)
        $('#copyInviteLink').on('click', function() {
            const link = $('#inviteLink').val();
            if (!link) return;
            navigator.clipboard.writeText(link).then(() => {
                const $btn = $(this);
                const orig = $btn.html();
                $btn.html('<i class="bx bx-check"></i> Copied!');
                setTimeout(() => $btn.html(orig), 2000);
            });
        });

        // Copy invite link from table row
        function copyInviteLinkFromTable(code) {
            const link = window.location.origin + '/join/' + code;
            navigator.clipboard.writeText(link).then(() => {
                alert('Invite link copied! Share it with students.');
            }).catch(() => alert('Could not copy. Share the link manually: ' + link));
        }

        // Show invite link when modal opens with existing class
        $('#classModal').on('shown.bs.modal', function() {
            updateInviteLink();
        });

        // Initialize
        loadClasses();

        // Toggle Sidebar
        document.getElementById('menu-toggle').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('sidebar').classList.toggle('sidebar-collapsed');
            document.getElementById('main-content').classList.toggle('main-content-expanded');
        });
    </script>
</body>
</html>
